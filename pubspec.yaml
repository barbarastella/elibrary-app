name: elibrary
description: "Um aplicativo para controle de leituras com Inteligência Artificial integrada."
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  google_sign_in: ^6.2.1
  flutter_gemini: ^3.0.0
  google_mlkit_barcode_scanning: ^0.10.0
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  http: ^1.6.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env